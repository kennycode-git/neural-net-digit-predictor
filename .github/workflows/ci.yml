name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ml-quality:
    name: ML — lint + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ml/requirements.txt

      - name: Install ML dependencies
        run: pip install -r ml/requirements.txt

      - name: Lint (ruff)
        run: ruff check ml/

      - name: Run tests
        working-directory: ml
        run: pytest tests/ -v --tb=short
        # test_onnx_parity is auto-skipped when model.onnx is absent (CI without LFS data)
        # test_preprocess runs unconditionally

  backend-lint:
    name: Backend — lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Lint backend
        run: ruff check backend/
